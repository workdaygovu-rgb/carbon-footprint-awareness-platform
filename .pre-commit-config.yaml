# Pre-commit hooks: catch issues before they reach CI.
# Install once with: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-typecheck
        name: Frontend TypeScript type check
        entry: npm run typecheck
        language: system
        types: [ts, tsx]
        pass_filenames: false
        files: ^frontend/

      - id: frontend-lint
        name: Frontend ESLint
        entry: npm run lint
        language: system
        types: [ts, tsx, js]
        pass_filenames: false
        files: ^frontend/

      - id: frontend-format
        name: Frontend Prettier check
        entry: npm run format:check
        language: system
        types: [ts, tsx, js, json, css, html]
        pass_filenames: false
        files: ^frontend/
